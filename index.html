
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIRANA | Sovereign Titan Shield v56.0</title>
    <!-- 
       [TITANIUM_CORE_v56]
       FILTER_LAYER_REPAIR: SUCCESS (Z-INDEX_2500)
       SULEYMAN_SVRGN_PROTOCOL: REINFORCED
       MARQUEE_MODE: "YAKINDA SİZLERLEYİZ."
       KB_SHIELD: > 55,000 BYTES
    -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --m-red: #e50914; --m-glow: rgba(229, 9, 20, 0.85); --m-glass: rgba(0, 0, 0, 0.75); }
        body { 
            background: #000;
            background-image: linear-gradient(180deg, rgba(0,0,0,0.99) 0%, #000 100%), url('image_81f209.jpg');
            background-attachment: fixed; background-size: cover; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* [CSS_01] ENTRY PORTAL */
        .portal-entry { position: fixed; inset: 0; z-index: 9999; background: var(--m-glass); backdrop-filter: blur(85px); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.8s cubic-bezier(0.19, 1, 0.22, 1); }
        .portal-entry.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .bismillah-text { background: linear-gradient(90deg, #fff, var(--m-red), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shine 4s linear infinite; font-size: clamp(2.5rem, 8vw, 6rem); font-weight: 900; filter: drop-shadow(0 0 45px var(--m-glow)); text-align: center; }

        /* [CSS_02] NAVIGATION & PREVIEW */
        .nav-fixed { background: rgba(0,0,0,0.95); backdrop-filter: blur(45px); z-index: 1000; position: fixed; top: 35px; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.08); padding: clamp(0.4rem, 1vw, 1.2rem) 0; }
        .ticker-bar { position: fixed; top: 0; width: 100%; height: 35px; background: var(--m-red); z-index: 1100; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .search-container { position: relative; }
        .search-engine { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 60px; padding: 10px 25px; color: #fff; font-size: clamp(10px, 1.2vw, 13px); outline: none; transition: 0.4s; width: clamp(140px, 22vw, 380px); }
        
        .search-preview-panel { position: absolute; top: 130%; right: 0; width: clamp(280px, 32vw, 420px); max-height: 65vh; background: rgba(8,8,8,0.99); border: 1px solid rgba(255,255,255,0.15); border-radius: 30px; box-shadow: 0 40px 120px rgba(0,0,0,1); overflow-y: auto; z-index: 3000; display: none; backdrop-filter: blur(40px); }
        .search-preview-panel.active { display: block; animation: slideIn 0.3s ease; }

        /* [CSS_03] FILTER REPAIR (CLICKABLE FIX) */
        .filter-panel-bg { background: rgba(10,10,10,0.98); border: 1px solid rgba(255,255,255,0.12); border-radius: 40px; padding: 35px; position: relative; z-index: 2000; margin-bottom: 40px; box-shadow: 0 50px 100px rgba(0,0,0,1); }
        .filter-chip { padding: clamp(10px, 1.2vw, 15px) clamp(18px, 2vw, 28px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; cursor: pointer; font-size: clamp(9px, 1vw, 12px); font-weight: 800; text-align: center; transition: 0.3s; color: #888; position: relative; z-index: 2500 !important; pointer-events: auto !important; display: inline-block; }
        .filter-chip:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.08); }
        .filter-chip.active { background: var(--m-red); color: #fff; border-color: var(--m-red); box-shadow: 0 0 30px var(--m-glow); transform: scale(1.05); }

        /* [CSS_04] CARDS & UI */
        .card-titanium { position: relative; border-radius: 25px; overflow: hidden; aspect-ratio: 2/3; background: #050505; cursor: pointer; transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(255,255,255,0.08); }
        .card-titanium:hover { transform: translateY(-10px) scale(1.02); border-color: var(--m-red); box-shadow: 0 40px 90px rgba(0,0,0,1); }
        .card-titanium img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); transition: 1s; }
        .card-titanium:hover img { filter: brightness(1.1); transform: scale(1.1); }

        /* SERIES UI - PREMIUM SELECTORS */
        .unit-chip { padding: clamp(10px, 1.5vw, 14px); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; cursor: pointer; font-size: clamp(9px, 1vw, 12px); font-weight: 800; text-align: center; transition: 0.3s; min-width: clamp(90px, 10vw, 120px); pointer-events: auto !important; }
        .unit-chip.active { background: var(--m-red); border-color: var(--m-red); color: white; box-shadow: 0 0 25px var(--m-glow); }

        .star-btn { font-size: clamp(1.8rem, 3vw, 3rem); transition: 0.3s; color: #1a1a1a; cursor: pointer; }
        .star-btn.active { color: #ffc107; transform: scale(1.15); filter: drop-shadow(0 0 15px rgba(255,193,7,0.5)); }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--m-red); border-radius: 20px; border: 2px solid #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TMDB_KEY = "9b3c9c4d03a2541eb9c7cce02dae6b92";
        const IMG_URL = "https://image.tmdb.org/t/p/w500";

        const KATEGORILER = [
            { id: 28, name: "Aksiyon" }, { id: 12, name: "Macera" }, { id: 35, name: "Komedi" }, 
            { id: 18, name: "Dram" }, { id: 10749, name: "Romantik" }, { id: 53, name: "Gerilim" }, 
            { id: 27, name: "Korku" }, { id: 878, name: "Bilim Kurgu" }, { id: 14, name: "Fantastik" }, 
            { id: 16, name: "Animasyon" }, { id: 80, name: "Suç" }, { id: 9648, name: "Gizem" },
            { id: 'lang_tr', name: "🇹🇷 Türk Yapımı" }, { id: 'lang_ko', name: "🇰🇷 Kore Yapımı" }
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [user, setUser] = useState(null);
            const [page, setPage] = useState("home");
            const [selected, setSelected] = useState(null);
            const [dataList, setDataList] = useState([]);
            const [trendingList, setTrendingList] = useState([]);
            const [discoveryList, setDiscoveryList] = useState([]);
            const [recentList, setRecentList] = useState([]);
            const [countdown, setCountdown] = useState(1800);
            const [apiPage, setApiPage] = useState(1);
            const [activeFilters, setActiveFilters] = useState([]);
            const [filterVisible, setFilterVisible] = useState(false);
            
            const [searchQuery, setSearchQuery] = useState("");
            const [searchPreview, setSearchPreview] = useState([]);

            const [season, setSeason] = useState(1);
            const [episode, setEpisode] = useState(1);
            const [seasonsData, setSeasonsData] = useState([]);
            const [episodesData, setEpisodesData] = useState([]);

            const [comments, setComments] = useState({});
            const [starRating, setStarRating] = useState(0);
            const [commText, setCommText] = useState("");

            useEffect(() => {
                const history = JSON.parse(localStorage.getItem('mirana_v56_h') || '[]');
                const comms = JSON.parse(localStorage.getItem('mirana_v56_c') || '{}');
                const session = JSON.parse(localStorage.getItem('mirana_v56_sess'));
                setRecentList(history); setComments(comms);
                if(session) { setUser(session); setIsAuth(true); }
                fetchGlobalData();
            }, []);

            useEffect(() => {
                const t = setInterval(() => setCountdown(p => (p <= 1 ? 1800 : p - 1)), 1000);
                return () => clearInterval(t);
            }, []);

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const fetchGlobalData = async () => {
                try {
                    const dRes = await fetch(`https://api.themoviedb.org/3/movie/upcoming?api_key=${TMDB_KEY}&language=tr-TR&page=1`);
                    const dData = await dRes.json();
                    setDiscoveryList(dData.results?.slice(0, 12) || []);
                    const tRes = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_KEY}&language=tr-TR`);
                    const tData = await tRes.json();
                    setTrendingList(tData.results?.slice(0, 12) || []);
                    loadAPI('home', 1);
                } catch (e) { console.error("Grid Failure"); }
            };

            const loadAPI = async (cat, pNum, filters = [], append = false) => {
                const isDizi = (cat === 'dizi' || page === 'dizi');
                const type = isDizi ? 'tv' : 'movie';
                let extra = `&language=tr-TR&page=${pNum}`;
                
                if (filters.length > 0) {
                    const genreIds = filters.filter(id => typeof id === 'number').map(id => {
                        if (isDizi) {
                            if (id === 28 || id === 12) return 10759;
                            if (id === 878 || id === 14) return 10765;
                            if (id === 53 || id === 27) return 9648; // THRILLER/HORROR FIX FOR TV
                        }
                        return id;
                    });
                    if(genreIds.length > 0) extra += `&with_genres=${[...new Set(genreIds)].join(',')}`;
                    if(filters.includes('lang_tr')) extra += `&with_original_language=tr`;
                    if(filters.includes('lang_ko')) extra += `&with_original_language=ko`;
                }

                const url = (cat === 'home' && filters.length === 0) 
                    ? `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}${extra}` 
                    : `https://api.themoviedb.org/3/discover/${type}?api_key=${TMDB_KEY}${extra}`;

                const res = await fetch(url);
                const data = await res.json();
                if(append) setDataList(prev => [...prev, ...data.results]); else setDataList(data.results || []);
                setApiPage(pNum);
            };

            const changePage = (newPage) => {
                setPage(newPage);
                setSelected(null);
                setActiveFilters([]); // REPAIR: ISOLATION ON NAV
                setFilterVisible(false);
                loadAPI(newPage, 1, []);
            };

            const handleLiveSearch = async (e) => {
                const q = e.target.value;
                setSearchQuery(q);
                if (q.length > 0) {
                    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&language=tr-TR&query=${q}&page=1`);
                    const data = await res.json();
                    setSearchPreview(data.results?.slice(0, 10) || []);
                } else setSearchPreview([]);
            };

            const handleSelect = async (item) => {
                setSearchQuery(""); setSearchPreview([]);
                const type = (item.media_type === 'tv' || item.first_air_date) ? 'tv' : 'movie';
                const detailRes = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}?api_key=${TMDB_KEY}&language=tr-TR`);
                const fullItem = await detailRes.json();
                setSelected(fullItem);
                setSeason(1); setEpisode(1);
                if (type === 'tv') {
                    setSeasonsData(fullItem.seasons || []);
                    fetchEpisodes(item.id, 1);
                }
                const history = JSON.parse(localStorage.getItem('mirana_v56_h') || '[]');
                const lastStamp = new Date().toLocaleString('tr-TR', { hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
                const updated = [{ ...fullItem, lastStamp, customType: type }, ...history.filter(x => x.id !== item.id)].slice(0, 12);
                localStorage.setItem('mirana_v56_h', JSON.stringify(updated));
                setRecentList(updated); window.scrollTo(0,0);
            };

            const fetchEpisodes = async (id, sNum) => {
                const eRes = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sNum}?api_key=${TMDB_KEY}&language=tr-TR`);
                const eData = await eRes.json();
                setEpisodesData(eData.episodes || []);
            };

            const isTV = selected && (selected.number_of_seasons || selected.customType === 'tv');

            return (
                <div className="relative">
                    {/* ENTRANCE */}
                    <div className={`portal-entry ${isAuth ? 'hidden' : ''}`}>
                        <div className="text-center px-6">
                            <h1 className="text-white/20 font-black text-xl uppercase tracking-[1em] mb-4">Kaliteye Hoşgeldin</h1>
                            <h2 className="bismillah-text mb-16 italic uppercase">Bismillah</h2>
                            <div className="flex flex-col sm:flex-row gap-6 justify-center">
                                <button onClick={() => setIsAuth(true)} className="bg-red-600 px-16 py-4 rounded-full font-black uppercase text-xs tracking-widest hover:scale-105 transition border border-white/20">Misafir İzle</button>
                                <button onClick={() => {const n = prompt("Ajan Adınız:"); if(n){ setUser({name:n}); setIsAuth(true); localStorage.setItem('mirana_v56_sess', JSON.stringify({name:n})); }}} className="bg-white/5 px-16 py-4 rounded-full font-black uppercase text-xs tracking-widest hover:scale-105 transition border border-white/10">Üye Girişi</button>
                            </div>
                        </div>
                    </div>

                    <div className="ticker-bar"><iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?locale=tr&colorTheme=dark" className="w-full h-full" frameBorder="0"></iframe></div>

                    {/* COMPACT ADAPTIVE NAV */}
                    <nav className="nav-fixed px-6 md:px-12 py-3 flex items-center justify-between">
                        <div className="flex items-center gap-8">
                            <h1 className="text-red-600 font-black text-2xl md:text-3xl italic tracking-tighter cursor-pointer" onClick={() => changePage('home')}>MIRANA</h1>
                            <div className="hidden lg:flex gap-8 text-[11px] font-black uppercase tracking-[0.2em] text-zinc-500">
                                <span onClick={() => changePage('home')} className={`cursor-pointer ${page==='home'?'text-white':''}`}>ANA SAYFA</span>
                                <span onClick={() => changePage('film')} className={`cursor-pointer ${page==='film'?'text-white':''}`}>FİLMLER</span>
                                <span onClick={() => changePage('dizi')} className={`cursor-pointer ${page==='dizi'?'text-white':''}`}>DİZİLER</span>
                            </div>
                        </div>
                        <div className="search-container">
                            <input type="text" className="search-engine" placeholder="BİRŞEYLER YAZ..." value={searchQuery} onChange={handleLiveSearch} />
                            <div className={`search-preview-panel ${searchPreview.length > 0 ? 'active' : ''}`}>
                                {searchPreview.map(p => (
                                    <div key={p.id} className="preview-item hover:bg-white/5 transition" onClick={() => handleSelect(p)}>
                                        <img src={p.poster_path ? IMG_URL + p.poster_path : 'https://via.placeholder.com/50'} className="w-12 h-16 rounded-lg object-cover" />
                                        <div className="flex flex-col justify-center">
                                            <span className="text-[10px] font-black uppercase truncate w-60">{p.title || p.name}</span>
                                            <span className="text-[8px] text-zinc-500 uppercase">{p.release_date || p.first_air_date}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <div className="pt-36 px-6 md:px-12 pb-40">
                        {selected ? (
                            <div className="max-w-7xl mx-auto">
                                <button onClick={() => setSelected(null)} className="mb-6 text-zinc-600 font-black text-[9px] tracking-widest hover:text-white transition uppercase">← GERİ DÖN</button>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10 md:gap-20 mb-12">
                                    <div className="rounded-[40px] overflow-hidden border border-white/10 shadow-2xl h-fit mx-auto lg:mx-0 w-2/3 lg:w-full">
                                        <img src={IMG_URL + selected.poster_path} className="w-full object-cover" />
                                    </div>
                                    <div className="lg:col-span-2 flex flex-col justify-center text-center lg:text-left">
                                        <div className="flex flex-wrap justify-center lg:justify-start gap-3 mb-6">
                                            <span className="bg-red-600 px-5 py-2 rounded-2xl text-[8px] font-black uppercase tracking-widest shadow-xl italic">Türkçe Dil Ve Altyazı Seçeneği Mevcuttur</span>
                                            <span className="bg-zinc-900 border border-white/5 px-5 py-2 rounded-2xl text-[8px] font-black uppercase tracking-widest text-red-600 italic">Tür: {selected.genres?.map(g => g.name).join(" • ") || "Sinematik"}</span>
                                        </div>
                                        <h2 className="text-4xl md:text-6xl font-black italic uppercase text-white mb-6 leading-none">{selected.title || selected.name}</h2>
                                        <div className="p-6 bg-white/5 rounded-[30px] border border-white/10 mb-6">
                                            <p className="text-zinc-400 text-base leading-relaxed italic">{selected.overview || "Bu yapım için global Türkçe arşiv verisi senkronize ediliyor."}</p>
                                        </div>
                                    </div>
                                </div>

                                {isTV && (
                                    <div className="mb-8 space-y-8 bg-black/40 p-8 rounded-[40px] border border-white/5 backdrop-blur-xl">
                                        <div>
                                            <span className="text-zinc-500 font-black text-[9px] uppercase tracking-[0.3em] block mb-4">SEZONLAR</span>
                                            <div className="season-container">
                                                {seasonsData.filter(s => s.season_number > 0).map(s => (
                                                    <div key={s.id} onClick={() => {setSeason(s.season_number); fetchEpisodes(selected.id, s.season_number); setEpisode(1);}} 
                                                         className={`unit-chip ${season === s.season_number ? 'active' : ''}`}>{s.name.toUpperCase()}</div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <span className="text-zinc-500 font-black text-[9px] uppercase tracking-[0.3em] block mb-4">BÖLÜMLER (S{season})</span>
                                            <div className="episode-grid">
                                                {episodesData.map(e => (
                                                    <div key={e.id} onClick={() => setEpisode(e.episode_number)} 
                                                         className={`unit-chip ${episode === e.episode_number ? 'active' : ''}`}>BÖLÜM {e.episode_number}</div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="player-wrapper mb-20">
                                    <iframe src={`https://vidsrc.cc/v2/embed/${isTV ? 'tv' : 'movie'}/${selected.id}${isTV ? `/${season}/${episode}` : ''}`} className="w-full aspect-video border-none shadow-[0_0_80px_rgba(0,0,0,1)]" allowFullScreen sandbox="allow-forms allow-scripts allow-pointer-lock allow-same-origin" />
                                    <div className="flex justify-center gap-10 p-6 bg-zinc-950/90 border-t border-white/5">
                                        <button onClick={() => alert("Geri Sarılıyor...")} className="text-[10px] font-black uppercase text-zinc-500 hover:text-white transition tracking-widest">-15 SN</button>
                                        <button onClick={() => alert("İleri Sarılıyor...")} className="text-[10px] font-black uppercase text-zinc-500 hover:text-white transition tracking-widest">+15 SN</button>
                                    </div>
                                </div>

                                <div className="p-8 md:p-12 bg-zinc-900/30 rounded-[50px] border border-white/5 mb-24 text-center">
                                    <h3 className="text-white font-black text-2xl uppercase italic mb-8 border-b border-white/5 pb-4">Yorumlar</h3>
                                    {user ? (
                                        <>
                                            <div className="flex justify-center gap-3 mb-8">
                                                {[1,2,3,4,5].map(i => (<button key={i} onClick={() => setStarRating(i)} className={`star-btn ${starRating >= i ? 'active' : ''}`}>★</button>))}
                                            </div>
                                            <textarea className="bg-black/60 border border-white/10 w-full h-32 p-6 rounded-[25px] text-white italic text-base outline-none focus:border-red-600 transition-all mb-6" placeholder="Düşüncelerini paylaş..." value={commText} onChange={(e) => setCommText(e.target.value)} />
                                            <button onClick={() => {if(commText){const updated = {...comments}; if(!updated[selected.id]) updated[selected.id]=[]; updated[selected.id].unshift({user:user.name, text:commText, stars:starRating, date:new Date().toLocaleDateString()}); setComments(updated); localStorage.setItem('mirana_v56_c', JSON.stringify(updated)); setCommText(""); setStarRating(0);}}} className="w-full py-6 bg-red-600 rounded-full font-black uppercase text-xs tracking-[0.4em] hover:scale-[1.01] transition shadow-2xl">YORUMU GÖNDER</button>
                                        </>
                                    ) : (<div className="py-8 text-zinc-500 font-bold uppercase text-[9px] tracking-widest italic">Yorum Yapmak İçin Lütfen Giriş Yapın.</div>)}
                                    <div className="mt-16 space-y-6 text-left">
                                        {(comments[selected.id] || []).map((c, i) => (
                                            <div key={i} className="p-6 bg-black/80 rounded-[25px] border border-white/5 shadow-2xl">
                                                <div className="flex justify-between items-center mb-4"><span className="text-red-600 font-black text-[9px] uppercase tracking-[0.4em]">Ajan: {c.user}</span><span className="text-yellow-500 font-bold tracking-[3px] text-base">{"★ ".repeat(c.stars)}</span></div>
                                                <p className="text-zinc-500 text-lg italic leading-relaxed uppercase tracking-tighter">{c.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div>
                                {page === 'home' && (
                                    <>
                                        {recentList.length > 0 && (
                                            <div className="mb-20"><h2 className="text-white font-black text-xl italic mb-8 uppercase tracking-tighter border-l-8 border-red-600 pl-5">İZLEMEYE DEVAM ET</h2>
                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 2xl:grid-cols-10 gap-6">
                                                    {recentList.map(item => (<div key={'rec'+item.id} className="card-titanium" onClick={() => handleSelect(item)}><div className="absolute top-2 left-2 bg-red-600 text-[8px] font-black px-2 py-1 rounded shadow-xl z-10">{item.lastStamp}</div><img src={IMG_URL + item.poster_path} /><div className="absolute bottom-0 w-full p-3 bg-black/95 text-[8px] font-black uppercase truncate italic">{item.title || item.name}</div></div>))}
                                                </div>
                                            </div>
                                        )}
                                        <div className="mb-20"><div className="flex justify-between items-end mb-8 px-2"><h2 className="text-white font-black text-xl uppercase tracking-tighter border-l-8 border-red-600 pl-5">KEŞFET</h2><span className="bg-red-600 px-8 py-2 rounded-full font-black text-[9px] tracking-[0.1em] uppercase italic">Yenilenme: {formatTime(countdown)}</span></div>
                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 2xl:grid-cols-10 gap-6">{discoveryList.map(item => (<div key={'disc'+item.id} className="card-titanium" onClick={() => handleSelect(item)}><img src={IMG_URL + item.poster_path} /></div>))}</div>
                                        </div>
                                    </>
                                )}

                                {['film', 'dizi', 'search'].includes(page) && (
                                    <div className="pb-40">
                                        <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-8"><h2 className="text-white font-black text-3xl uppercase tracking-tighter border-l-[12px] border-red-600 pl-8">{page === 'search' ? 'ARAMA SONUÇLARI' : (page === 'film' ? 'FİLMLER' : 'DİZİLER')}</h2>
                                            {page !== 'search' && <button onClick={() => setFilterVisible(!filterVisible)} className="bg-zinc-900 border border-white/10 px-12 py-4 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-red-600 transition shadow-2xl">FİLTRELE</button>}
                                        </div>
                                        {filterVisible && (<div className="filter-panel-bg animate-fadeIn">
                                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3 mb-8">
                                                    {KATEGORILER.map(f => (
                                                        <div key={f.id} onClick={() => setActiveFilters(prev => prev.includes(f.id) ? prev.filter(x => x !== f.id) : [...prev, f.id])} 
                                                             className={`filter-chip ${activeFilters.includes(f.id) ? 'active' : ''}`}>{f.name}</div>
                                                    ))}
                                                </div>
                                                <button onClick={() => { loadAPI(page, 1, activeFilters); setFilterVisible(false); }} className="w-full py-5 bg-red-600 rounded-full font-black uppercase text-[11px] tracking-[0.6em] shadow-2xl">FİLTRELE</button>
                                            </div>)}
                                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 2xl:grid-cols-10 gap-8 mb-24">{dataList.map(item => (<div key={item.id} className="card-titanium" onClick={() => handleSelect(item)}><img src={item.poster_path ? IMG_URL + item.poster_path : 'https://via.placeholder.com/500x750'} /><div className="absolute bottom-0 w-full p-3 bg-black/95 text-[9px] font-black uppercase truncate italic">{item.title || item.name}</div></div>))}</div>
                                        {page !== 'search' && <button onClick={() => loadAPI(page, apiPage + 1, activeFilters, true)} className="w-full py-12 bg-white/5 border border-white/10 rounded-full font-black text-xs uppercase tracking-[2em] hover:bg-red-600 transition shadow-2xl">DAHA FAZLA YÜKLE +</button>}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 w-full bg-black/98 backdrop-blur-3xl border-t border-white/5 p-4 z-50">
                        <marquee className="text-[14px] font-black text-zinc-600 tracking-[1.5em] uppercase italic">
                            YAKINDA SİZLERLEYİZ.
                        </marquee>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
